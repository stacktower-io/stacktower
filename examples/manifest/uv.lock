version = 1

[[package]]
name = "example-python-project"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "click" },
    { name = "httpx" },
    { name = "pydantic" },
    { name = "requests" },
    { name = "rich" },
]

[[package]]
name = "annotated-types"
version = "0.7.0"

[[package]]
name = "anyio"
version = "4.8.0"
dependencies = [
    { name = "idna" },
    { name = "sniffio" },
]

[[package]]
name = "certifi"
version = "2024.12.14"

[[package]]
name = "charset-normalizer"
version = "3.4.1"

[[package]]
name = "click"
version = "8.1.8"
dependencies = [
    { name = "colorama", marker = "sys_platform == 'win32'" },
]

[[package]]
name = "colorama"
version = "0.4.6"

[[package]]
name = "h11"
version = "0.14.0"

[[package]]
name = "httpcore"
version = "1.0.7"
dependencies = [
    { name = "certifi" },
    { name = "h11" },
]

[[package]]
name = "httpx"
version = "0.28.1"
dependencies = [
    { name = "anyio" },
    { name = "certifi" },
    { name = "httpcore" },
    { name = "idna" },
]

[[package]]
name = "idna"
version = "3.10"

[[package]]
name = "markdown-it-py"
version = "3.0.0"
dependencies = [
    { name = "mdurl" },
]

[[package]]
name = "mdurl"
version = "0.1.2"

[[package]]
name = "pydantic"
version = "2.10.5"
dependencies = [
    { name = "annotated-types" },
    { name = "pydantic-core" },
    { name = "typing-extensions" },
]

[[package]]
name = "pydantic-core"
version = "2.27.2"
dependencies = [
    { name = "typing-extensions" },
]

[[package]]
name = "pygments"
version = "2.19.1"

[[package]]
name = "requests"
version = "2.32.3"
dependencies = [
    { name = "certifi" },
    { name = "charset-normalizer" },
    { name = "idna" },
    { name = "urllib3" },
]

[[package]]
name = "rich"
version = "13.9.4"
dependencies = [
    { name = "markdown-it-py" },
    { name = "pygments" },
]

[[package]]
name = "sniffio"
version = "1.3.1"

[[package]]
name = "typing-extensions"
version = "4.12.2"

[[package]]
name = "urllib3"
version = "2.3.0"
